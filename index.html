<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Datos del conductor</title>
</head>

<body style="font-family: Arial; padding: 20px;">

  <h2>🚗 Datos del conductor</h2>

  <p><strong>Nombre:</strong> <span id="nombre"></span></p>
  <p><strong>DNI:</strong> <span id="dni"></span></p>
  <p><strong>Teléfono:</strong> <span id="telefono"></span></p>
  <p><strong>Email:</strong> <span id="email"></span></p>

  <h2>🚘 Vehículo</h2>

  <p><strong>Patente:</strong> <span id="patente"></span></p>
  <p><strong>Modelo:</strong> <span id="modelo"></span></p>

  <h2>🛡️ Seguro</h2>

  <p><strong>Aseguradora:</strong> <span id="seguro"></span></p>
  <p><strong>Póliza:</strong> <span id="poliza"></span></p>

  <script>
    const params = new URLSearchParams(window.location.search);

    document.getElementById("nombre").innerText = params.get("nombre") || "";
    document.getElementById("dni").innerText = params.get("dni") || "";
    document.getElementById("telefono").innerText = params.get("telefono") || "";
    document.getElementById("email").innerText = params.get("email") || "";
    document.getElementById("patente").innerText = params.get("patente") || "";
    document.getElementById("modelo").innerText = params.get("modelo") || "";
    document.getElementById("seguro").innerText = params.get("seguro") || "";
    document.getElementById("poliza").innerText = params.get("poliza") || "";
  </script>

</body>
</html>
