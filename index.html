<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Datos del conductor</title>
</head>
<body>

<h2>🚗 Datos del conductor</h2>
<p id="nombre"></p>
<p id="dni"></p>
<p id="telefono"></p>

<h2>🚘 Vehículo</h2>
<p id="patente"></p>
<p id="modelo"></p>

<h2>🛡️ Seguro</h2>
<p id="seguro"></p>
<p id="poliza"></p>

<script>
const params = new URLSearchParams(window.location.search);

function setText(id, label, value) {
  document.getElementById(id).innerText = label + ": " + (value ? value : "-");
}

setText("nombre", "Nombre", params.get("nombre"));
setText("dni", "DNI", params.get("dni"));
setText("telefono", "Teléfono", params.get("telefono"));

setText("patente", "Patente", params.get("patente"));
setText("modelo", "Modelo", params.get("modelo"));

setText("seguro", "Aseguradora", params.get("seguro"));
setText("poliza", "Póliza", params.get("poliza"));
</script>

</body>
</html>
